  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {

      --fg:#e8ecf2;--fg2:#c0c8d4;--muted:#5a6a80;--muted2:#3d4d60;
      --accent:#fbbf24;--accent2:#f59e0b;--accent3:#d97706;
      --border:#152035;--border2:#1a2840;
      --green:#00e89d;--cyan:#00c4ff;--purple:#a78bfa;
      --pink:#f472b6;--red:#f87171;--amber:#fbbf24;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--fg);overflow:hidden;height:100vh}
    .font-mono{font-family:'JetBrains Mono',monospace}

    /* Ambient */
    .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(251,191,36,0.018) 1px,transparent 1px),linear-gradient(90deg,rgba(251,191,36,0.018) 1px,transparent 1px);background-size:60px 60px;z-index:0;pointer-events:none}
    .orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;animation:orbF 18s ease-in-out infinite alternate}
    .orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(251,191,36,0.07),transparent 70%);top:-180px;left:-150px}
    .orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(245,158,11,0.05),transparent 70%);bottom:-100px;right:-120px;animation-delay:-6s}
    .orb-3{width:250px;height:250px;background:radial-gradient(circle,rgba(0,232,157,0.04),transparent 70%);top:40%;left:50%;animation-delay:-10s}
    @keyframes orbF{0%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-40px) scale(1.1)}100%{transform:translate(-20px,25px) scale(0.93)}}

    /* Navbar */
    .navbar{position:fixed;top:0;left:0;right:0;z-index:100;backdrop-filter:blur(20px);background:rgba(6,10,16,0.85);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center}
    .nav-link{position:relative;color:var(--muted);transition:color .3s;text-decoration:none;font-size:.88rem}
    .nav-link:hover,.nav-link.active{color:var(--accent)}
    .nav-link::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;background:var(--accent);transition:width .3s}
    .nav-link:hover::after,.nav-link.active::after{width:100%}

    /* Layout */
    .app-layout{display:flex;height:100vh;padding-top:60px;position:relative;z-index:1}

    /* Sidebar */
    .sidebar{width:280px;border-right:1px solid var(--border);background:rgba(6,10,16,0.6);backdrop-filter:blur(10px);display:flex;flex-direction:column;flex-shrink:0;transition:transform .3s}
    .sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
    .new-chat-btn{width:100%;padding:11px 16px;border-radius:12px;border:1px solid var(--border);background:var(--bg-card);color:var(--fg);font-family:inherit;font-size:.88rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .3s}
    .new-chat-btn:hover{border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.05)}
    .new-chat-btn i{color:var(--accent);font-size:.85rem}
    .sidebar-list{flex:1;overflow-y:auto;padding:8px}
    .sidebar-list::-webkit-scrollbar{width:3px}
    .sidebar-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .sidebar-item{padding:10px 14px;border-radius:10px;cursor:pointer;transition:all .2s;margin-bottom:2px;display:flex;align-items:center;gap:10px;group}
    .sidebar-item:hover{background:rgba(255,255,255,.03)}
    .sidebar-item.active{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.12)}
    .sidebar-item .si-icon{color:var(--muted);font-size:.75rem;flex-shrink:0;width:18px;text-align:center}
    .sidebar-item.active .si-icon{color:var(--accent)}
    .sidebar-item .si-text{font-size:.82rem;color:var(--fg2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .sidebar-item.active .si-text{color:var(--fg)}
    .sidebar-item .si-del{opacity:0;color:var(--muted);font-size:.7rem;transition:all .2s;padding:4px;flex-shrink:0}
    .sidebar-item:hover .si-del{opacity:1}
    .sidebar-item .si-del:hover{color:var(--red)}
    .sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);font-size:.7rem;color:var(--muted2);display:flex;align-items:center;gap:6px}

    /* Main Chat */
    .chat-main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}

    /* Chat Header */
    .chat-header{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:rgba(6,10,16,0.4);backdrop-filter:blur(8px);flex-shrink:0}
    .ch-avatar{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:1rem;color:#060a10;flex-shrink:0}
    .ch-info{flex:1;min-width:0}
    .ch-name{font-weight:700;font-size:.95rem;display:flex;align-items:center;gap:8px}
    .ch-name .model-tag{font-size:.6rem;padding:2px 8px;border-radius:6px;background:rgba(0,196,255,.1);color:var(--cyan);font-weight:500;border:1px solid rgba(0,196,255,.15)}
    .ch-status{font-size:.72rem;display:flex;align-items:center;gap:5px;margin-top:1px}
    .ch-status .dot{width:5px;height:5px;border-radius:50%;animation:pulse-d 2s ease-in-out infinite}
    .ch-status.online .dot{background:var(--green)}
    .ch-status.online{color:var(--green)}
    .ch-status.offline .dot{background:var(--amber)}
    .ch-status.offline{color:var(--amber)}
    .ch-status.error .dot{background:var(--red)}
    .ch-status.error{color:var(--red)}
    @keyframes pulse-d{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
    .ch-actions{display:flex;gap:4px}
    .ch-actions button{width:36px;height:36px;border-radius:10px;border:none;background:rgba(255,255,255,.03);color:var(--muted);cursor:pointer;transition:all .2s;font-size:.82rem;display:flex;align-items:center;justify-content:center}
    .ch-actions button:hover{background:rgba(255,255,255,.06);color:var(--fg)}

    /* Messages Area */
    .chat-messages{flex:1;overflow-y:auto;padding:24px 0}
    .chat-messages::-webkit-scrollbar{width:5px}
    .chat-messages::-webkit-scrollbar-track{background:transparent}
    .chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    .msg-wrapper{max-width:780px;margin:0 auto;padding:0 24px}
    .msg-date{display:flex;align-items:center;gap:12px;margin:20px 0 16px;font-size:.7rem;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em}
    .msg-date::before,.msg-date::after{content:'';flex:1;height:1px;background:var(--border)}

    .msg{display:flex;gap:14px;margin-bottom:20px;animation:msgIn .35s ease-out}
    @keyframes msgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .msg-avatar{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.75rem;margin-top:2px}
    .msg.bot .msg-avatar{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#060a10}
    .msg.user .msg-avatar{background:rgba(255,255,255,.05);color:var(--muted)}
    .msg-body{flex:1;min-width:0}
    .msg-name{font-size:.72rem;color:var(--muted);margin-bottom:5px;font-weight:500}
    .msg.user .msg-name{text-align:right}
    .msg-content{font-size:.9rem;line-height:1.75;color:var(--fg2)}
    .msg.user .msg-content{color:var(--fg)}
    .msg-content p{margin-bottom:10px}
    .msg-content p:last-child{margin-bottom:0}
    .msg-content strong{color:var(--accent);font-weight:600}
    .msg-content em{color:var(--fg);font-style:italic}
    .msg-content a{color:var(--accent);text-decoration:underline;text-underline-offset:2px}
    .msg-content code{font-family:'JetBrains Mono',monospace;background:rgba(255,255,255,.06);padding:2px 7px;border-radius:5px;font-size:.82rem;color:var(--cyan)}
    .msg-content pre{background:var(--bg);border:1px solid var(--border);border-radius:12px;margin:10px 0;overflow:hidden}
    .msg-content pre .code-header{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border);font-size:.7rem;color:var(--muted)}
    .msg-content pre .code-header .copy-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:3px 10px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:.68rem;transition:all .2s}
    .msg-content pre .code-header .copy-btn:hover{border-color:var(--accent);color:var(--accent)}
    .msg-content pre code{display:block;padding:14px;overflow-x:auto;font-size:.82rem;line-height:1.6;background:none;color:var(--fg2)}
    .msg-content ul,.msg-content ol{margin:8px 0;padding-left:20px}
    .msg-content li{margin-bottom:5px}
    .msg-content blockquote{border-left:3px solid var(--accent);padding:6px 14px;margin:10px 0;background:rgba(251,191,36,.03);border-radius:0 8px 8px 0;color:var(--fg2);font-size:.88rem}
    .msg-time{font-size:.62rem;color:var(--muted2);margin-top:6px}
    .msg.user .msg-time{text-align:right}

    /* Typing */
    .typing-msg{display:flex;gap:14px;margin-bottom:20px;animation:msgIn .35s ease-out}
    .typing-dots{display:flex;gap:5px;align-items:center;padding:14px 18px}
    .typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--muted);opacity:.3;animation:tBounce 1.4s ease-in-out infinite}
    .typing-dots span:nth-child(2){animation-delay:.15s}
    .typing-dots span:nth-child(3){animation-delay:.3s}
    @keyframes tBounce{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-7px);opacity:1}}

    /* Suggestions */
    .suggestions{max-width:780px;margin:0 auto;padding:0 24px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .sug-card{padding:16px 18px;border-radius:14px;border:1px solid var(--border);background:var(--bg-card);cursor:pointer;transition:all .3s;text-align:left}
    .sug-card:hover{border-color:rgba(251,191,36,.2);background:rgba(251,191,36,.03);transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.2)}
    .sug-card .sug-icon{font-size:1.1rem;margin-bottom:8px;color:var(--accent)}
    .sug-card .sug-title{font-size:.85rem;font-weight:600;margin-bottom:3px;color:var(--fg)}
    .sug-card .sug-desc{font-size:.74rem;color:var(--muted);line-height:1.5}

    /* Welcome */
    .welcome{max-width:780px;margin:0 auto;padding:20px 24px;text-align:center}
    .welcome-icon{width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:#060a10;margin:0 auto 20px;box-shadow:0 8px 30px rgba(251,191,36,.2)}
    .welcome h2{font-size:1.6rem;font-weight:700;margin-bottom:8px}
    .welcome p{color:var(--muted);font-size:.92rem;max-width:460px;margin:0 auto;line-height:1.7}

    /* Input Area */
    .chat-input-area{padding:16px 24px 20px;border-top:1px solid var(--border);background:rgba(6,10,16,0.5);backdrop-filter:blur(8px);flex-shrink:0}
    .input-wrapper{max-width:780px;margin:0 auto;position:relative}
    .input-box{display:flex;align-items:flex-end;gap:0;background:var(--bg-card);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .3s,box-shadow .3s}
    .input-box:focus-within{border-color:rgba(251,191,36,.3);box-shadow:0 0 30px rgba(251,191,36,.06)}
    .input-box textarea{flex:1;background:none;border:none;outline:none;padding:14px 18px;color:var(--fg);font-family:inherit;font-size:.9rem;resize:none;max-height:150px;line-height:1.5;min-height:48px}
    .input-box textarea::placeholder{color:var(--muted);opacity:.5}
    .send-btn{width:48px;height:48px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#060a10;cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0;margin:4px}
    .send-btn:hover:not(:disabled){box-shadow:0 0 20px rgba(251,191,36,.3);transform:scale(1.04)}
    .send-btn:disabled{opacity:.25;cursor:not-allowed;transform:none;box-shadow:none}
    .input-hint{text-align:center;font-size:.65rem;color:var(--muted2);margin-top:8px}

    /* Mobile sidebar toggle */
    .sidebar-toggle{display:none;width:36px;height:36px;border-radius:10px;border:none;background:rgba(255,255,255,.03);color:var(--muted);cursor:pointer;font-size:.9rem;align-items:center;justify-content:center;transition:all .2s}
    .sidebar-toggle:hover{background:rgba(255,255,255,.06);color:var(--fg)}
    .sidebar-overlay{display:none;position:fixed;inset:0;z-index:49;background:rgba(0,0,0,.5);backdrop-filter:blur(2px)}

    /* Toast */
    .toast{position:fixed;top:76px;right:24px;padding:12px 20px;border-radius:12px;background:var(--bg-card);border:1px solid var(--border);color:var(--fg);font-size:.85rem;z-index:200;box-shadow:0 10px 35px rgba(0,0,0,.5);transform:translateX(120%);transition:transform .4s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:8px;max-width:360px}
    .toast.show{transform:translateX(0)}

    /* Scroll to bottom btn */
    .scroll-bottom{position:absolute;bottom:100px;left:50%;transform:translateX(-50%) scale(0);width:36px;height:36px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:.75rem;display:flex;align-items:center;justify-content:center;transition:all .3s;z-index:5;box-shadow:0 4px 15px rgba(0,0,0,.4)}
    .scroll-bottom.visible{transform:translateX(-50%) scale(1)}
    .scroll-bottom:hover{border-color:var(--accent);color:var(--accent)}

    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    @media(max-width:768px){
      .sidebar{position:fixed;left:0;top:60px;bottom:0;z-index:50;transform:translateX(-100%);background:var(--bg)}
      .sidebar.open{transform:translateX(0)}
      .sidebar-overlay.open{display:block}
      .sidebar-toggle{display:flex}
      .suggestions{grid-template-columns:1fr!important}
      .chat-messages{padding:16px 0}
      .msg-wrapper{padding:0 16px}
      .suggestions{padding:0 16px}
      .welcome{padding:16px}
      .chat-input-area{padding:12px 12px 16px}
      .input-wrapper{margin:0}
    }
  </style>
</head>

    async function callGemini(history) {
      const body = {
        system_instruction: { parts:[{text:SYSTEM_PROMPT}] },
        contents: history.slice(-20),
        generationConfig: {
          temperature: 0.75,
          topP: 0.92,
          maxOutputTokens: 1200,
        },
        safetySettings: [
          {category:'HARM_CATEGORY_HARASSMENT',threshold:'BLOCK_NONE'},
          {category:'HARM_CATEGORY_HATE_SPEECH',threshold:'BLOCK_NONE'},
          {category:'HARM_CATEGORY_SEXUALLY_EXPLICIT',threshold:'BLOCK_MEDIUM_AND_ABOVE'},
          {category:'HARM_CATEGORY_DANGEROUS_CONTENT',threshold:'BLOCK_NONE'}
        ]
      };

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 15000);

      try {
        const res = await fetch(API_URL, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify(body),
          signal:controller.signal
        });
        clearTimeout(timeout);

        if (!res.ok) {
          const err = await res.json().catch(()=>({}));
          return { success:false, error:`HTTP ${res.status}: ${err.error?.message || 'Unknown error'}` };
        }

        const data = await res.json();
        if (data.candidates && data.candidates[0]?.content?.parts?.[0]?.text) {
          const raw = data.candidates[0].content.parts[0].text;
          const html = markdownToHtml(raw);
          return { success:true, raw, html };
        }
        if (data.candidates?.[0]?.finishReason === 'SAFETY') {
          return { success:false, error:'Jawaban diblokir oleh filter keamanan. Coba phrasing ulang pertanyaan.' };
        }
        return { success:false, error:'Tidak ada respons dari AI' };
      } catch(e) {
        clearTimeout(timeout);
        if (e.name === 'AbortError') return { success:false, error:'Timeout — server AI terlalu lama merespon. Coba lagi.' };
        return { success:false, error:e.message };
      }
    }

    /* =============================================
       MARKDOWN → HTML CONVERTER
    ============================================= */
    function markdownToHtml(text) {
      let html = text;

      // Code blocks with language
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
        const langLabel = lang || 'code';
        const codeId = 'code_' + Math.random().toString(36).slice(2,8);
        return `<pre><div class="code-header"><span>${escapeHtml(langLabel)}</span><button class="copy-btn" onclick="copyCode('${codeId}')"><i class="fas fa-copy"></i> Salin</button></div><code id="${codeId}" class="language-${lang}">${escapeHtml(code.trim())}</code></pre>`;
      });

      // Inline code
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

      // Bold
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

      // Italic
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

      // Blockquote
      html = html.replace(/^>\s+(.+)$/gm, '<blockquote>$1</blockquote>');

      // Unordered list
      html = html.replace(/^[-•]\s+(.+)$/gm, '<li>$1</li>');
      html = html.replace(/((?:<li>.*<\/li>\s*)+)/g, '<ul>$1</ul>');

      // Ordered list
      html = html.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');

      // Headings
      html = html.replace(/^####\s+(.+)$/gm, '<p><strong style="font-size:.88rem;color:var(--fg)">$1</strong></p>');
      html = html.replace(/^###\s+(.+)$/gm, '<p><strong style="font-size:.92rem;color:var(--fg)">$1</strong></p>');
      html = html.replace(/^##\s+(.+)$/gm, '<p><strong style="font-size:1rem;color:var(--fg)">$1</strong></p>');
      html = html.replace(/^#\s+(.+)$/gm, '<p><strong style="font-size:1.1rem;color:var(--fg)">$1</strong></p>');

      // Links
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

      // Line breaks (but not inside pre/code)
      html = html.replace(/\n/g, '<br>');

      // Clean up empty paragraphs
      html = html.replace(/<p><br><\/p>/g, '');
      html = html.replace(/<br><br>/g, '</p><p>');
      html = html.replace(/^/, '<p>').replace(/$/, '</p>');
      html = html.replace(/<p><p>/g, '<p>').replace(/<\/p><\/p>/g, '</p>');

      // Clean up <br> inside lists
      html = html.replace(/<li>(.*?)<br>/g, '<li>$1');

      return html;
    }

    function copyCode(id) {
      const el = document.getElementById(id);
      if (!el) return;
      navigator.clipboard.writeText(el.textContent).then(() => {
        showToast('Kode berhasil disalin');
      }).catch(() => {
        // Fallback
        const range = document.createRange();
        range.selectNode(el);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        window.getSelection().removeAllRanges();
        showToast('Kode berhasil disalin');
      });
    }

      let text = `HyunkBot — Export Chat\n${'='.repeat(40)}\n`;

      });
      const blob = new Blob([text], {type:'text/plain'});

    }

    function escapeHtml(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function getDateTime() {
      const n = new Date();
      const date = n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
      const time = String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
      return date+' '+time;
    }

    function formatDate(dateStr) {
      const parts = dateStr.split('-');
      const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
      return `${parseInt(parts[2])} ${months[parseInt(parts[1])-1]} ${parts[0]}`;
    }

    function showToast(msg) {
