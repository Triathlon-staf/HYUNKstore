<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Register - HyunkkCloud</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="icon" href="images/icon.png">
</head>

<body class="bg-[#0b1220] flex items-center justify-center min-h-screen text-white">

<div class="bg-[#0f172a] p-8 rounded-2xl border border-slate-800 w-full max-w-md">

  <h1 class="text-2xl font-bold text-center mb-2">Register</h1>
  <p class="text-gray-400 text-center mb-6">Buat akun baru</p>

  <form onsubmit="event.preventDefault(); registerUser();">

    <input id="email" type="email" placeholder="Email"
      class="w-full mb-4 p-3 rounded-lg bg-[#020617] border border-slate-700">

    <input id="password" type="password" placeholder="Password"
      class="w-full mb-4 p-3 rounded-lg bg-[#020617] border border-slate-700">

    <button class="w-full bg-green-500 hover:bg-green-600 p-3 rounded-lg font-semibold">
      Register
    </button>

  </form>

  <p class="text-center text-gray-400 mt-6 text-sm">
    Sudah punya akun?
    <a href="login.html" class="text-blue-400">Login</a>
  </p>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "ISI_PUNYAMU",
  authDomain: "ISI_PUNYAMU",
  projectId: "ISI_PUNYAMU",
  appId: "ISI_PUNYAMU"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.registerUser = () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Berhasil daftar!");
      window.location.href = "login.html";
    })
    .catch((error) => {
      alert(error.message);
    });
};
</script>

</body>
</html>
