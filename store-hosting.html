<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HYUNK STORE - HOME</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b1220] text-white">

<section class="text-center py-16">
  <h2 class="text-3xl font-bold">Minecraft Hosting</h2>
</section>

<section class="max-w-6xl mx-auto px-6 grid md:grid-cols-3 gap-6">

  <div class="bg-[#0f172a] p-6 rounded-xl border border-slate-800">
    <h3 class="font-bold">Basic</h3>
    <p class="text-gray-400">2GB RAM</p>
    <p class="text-green-400 mt-3">Rp50.000</p>
    <button onclick="beli('MC Basic')" class="mt-3 w-full bg-blue-500 py-2 rounded">
      Beli
    </button>
  </div>

</section>

<script>
function beli(produk) {
  let nomor = "6282189822272";
  let pesan = `Halo, saya mau beli ${produk}`;
  window.open(`https://wa.me/${nomor}?text=${encodeURIComponent(pesan)}`);
}
</script>

</body>
</html>
